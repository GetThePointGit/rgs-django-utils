[project]
name = "rgs-django-utils"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64", "osx-64"]
repository = "https://github.com/GetThePointGit/rgs-django-utils"

# -----------------------------------------------------------------------------
# Tasks (pixi run <name>)
# -----------------------------------------------------------------------------
# Scoped under the `dev` feature so they are only available in environments
# that include the dev dependencies (ruff, tox, build, twine, pre-commit).
[feature.dev.tasks]
# --- Testing ---
tests = "pytest --cov=rgs_django_utils --cov-report=term-missing --cov-report=xml"
tests-verbose = "pytest --cov=rgs_django_utils -v"
# Run the full Python × Django matrix (requires tox; integration tests need Postgres)
tox = "tox"
# Run the testapp management.py (e.g. createsuperuser on the test settings)
test-manage = "python tests/manage.py"

# --- Styling / linting ---
# `style` auto-sorts imports and formats. `lint` only checks rgs_django_utils/
# (tests get their own relaxed rules — see pyproject.toml).
sort-imports = "ruff check ./rgs_django_utils ./tests --select I --fix --force-exclude"
format = "ruff format ./rgs_django_utils ./tests --force-exclude"
style = { depends-on = ["sort-imports", "format"] }
lint = "ruff check ./rgs_django_utils"

# --- Build / publish ---
build-clean = "rm -rf dist build *.egg-info rgs_django_utils.egg-info"
build = { cmd = "python -m build", depends-on = ["build-clean"] }
build-check = { cmd = "python -m twine check dist/*", depends-on = ["build"] }
publish-test = { cmd = "python -m twine upload --repository testpypi dist/*", depends-on = ["build-check"] }
publish = { cmd = "python -m twine upload dist/*", depends-on = ["build-check"] }

# --- Pre-commit hooks ---
pre-commit-install = "pre-commit install --install-hooks"
pre-commit-run = "pre-commit run --all-files"
# Runs automatically after `pixi install` so contributors get the git
# hook wired without an extra manual step.
postinstall = { depends-on = ["pre-commit-install"] }

# Runtime dependencies live in `pyproject.toml [project] dependencies` so
# that `pip install rgs-django-utils` works outside pixi. The conda
# versions below are kept because conda-forge ships pre-built binaries
# (GDAL, geopandas, numpy, pandas) that are much faster to install than
# source-built wheels — pixi prefers the conda package when it is
# declared here.
[dependencies]
python = ">=3.12,<3.14"
GDAL = "*"
geopandas = "1.0.*"
numpy = "1.26.*"
pandas = "2.2.*"
shapely = "2.0.*"
psycopg = "3.2.*"
pip = "*"

[pypi-dependencies]
rgs-django-utils = { path = ".", editable = true }



# -----------------------------------------------------------------------------
# Dev feature: testing + linting + build tools
# -----------------------------------------------------------------------------
[feature.dev.dependencies]
pre-commit = "*"
twine = "*"
ruff = "*"
pixi-pycharm = "==0.0.11"

[feature.dev.pypi-dependencies]
notebook = "*"
build = "*"
tox = "*"

pytest-django = "*"
pytest-cov = "*"

# -----------------------------------------------------------------------------
# Environments
# -----------------------------------------------------------------------------
[environments]
default = { features = ["dev"], solve-group = "prod" }
prod = { features = [], solve-group = "prod" }
